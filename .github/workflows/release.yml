name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List dist
        run: dir dist

      - name: Create Release and Upload
        run: |
          $zip = Get-ChildItem dist\FileRenamer-*.zip | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME $zip.FullName --title "$env:GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
